services:
  # Telegram Bot 
  bot:
    build: .
    container_name: hogwarts-bot
    restart: always
    depends_on:
      - redis 
    environment:
      - REDIS_HOST=redis  
      - REDIS_PORT=6379
    volumes:
      
      - ./config.ini:/app/config.ini

  # Redis 
  redis:
    image: redis:7-alpine  
    container_name: hogwarts-redis
    restart: always
    volumes:
      
      - redis-data:/data


volumes:
  redis-data: